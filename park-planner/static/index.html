<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Park Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest: #2d4a3e;
            --forest-deep: #1a2f25;
            --sage: #7c9a82;
            --sage-light: #a8c5ae;
            --sand: #e8dcc8;
            --sand-light: #f5f0e8;
            --cream: #faf8f4;
            --bark: #5c4033;
            --sunset: #d4793a;
            --sunset-soft: #e8a76c;
            --sky: #6b9bc3;
            --rock: #8b8680;
            --white: #ffffff;
            --shadow: rgba(45, 74, 62, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: var(--cream);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--forest-deep);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--forest-deep) 0%, var(--forest) 60%, var(--sage) 100%);
            padding: 20px 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 20px var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(212, 121, 58, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .header-icon {
            font-size: 32px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .header-text h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 22px;
            color: var(--sand-light);
            letter-spacing: 0.5px;
        }

        .header-text p {
            font-size: 13px;
            color: var(--sage-light);
            font-weight: 300;
            margin-top: 2px;
            letter-spacing: 0.3px;
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(168, 197, 174, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(232, 167, 108, 0.08) 0%, transparent 50%),
                var(--cream);
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--forest), var(--sage));
            box-shadow: 0 2px 8px rgba(45, 74, 62, 0.25);
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, var(--sunset), var(--sunset-soft));
            box-shadow: 0 2px 8px rgba(212, 121, 58, 0.25);
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14.5px;
            font-weight: 400;
            max-width: 600px;
        }

        .message.assistant .message-bubble {
            background: var(--white);
            color: var(--forest-deep);
            border: 1px solid rgba(124, 154, 130, 0.2);
            border-radius: 4px 16px 16px 16px;
            box-shadow: 0 1px 8px var(--shadow);
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--forest), var(--forest-deep));
            color: var(--sand-light);
            border-radius: 16px 4px 16px 16px;
            box-shadow: 0 2px 12px rgba(45, 74, 62, 0.2);
        }

        .message-bubble p {
            margin-bottom: 10px;
        }

        .message-bubble p:last-child {
            margin-bottom: 0;
        }

        .message-bubble strong {
            font-weight: 600;
            color: var(--forest);
        }

        .message.user .message-bubble strong {
            color: var(--sand);
        }

        .message-bubble ul, .message-bubble ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message-bubble li {
            margin-bottom: 4px;
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
            gap: 12px;
            align-items: center;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 16px 20px;
            background: var(--white);
            border-radius: 4px 16px 16px 16px;
            border: 1px solid rgba(124, 154, 130, 0.2);
            box-shadow: 0 1px 8px var(--shadow);
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--sage);
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.16s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.32s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }

        /* Input Area */
        .input-area {
            padding: 16px 20px 20px;
            background: var(--sand-light);
            border-top: 1px solid rgba(124, 154, 130, 0.15);
        }

        .input-wrapper {
            max-width: 780px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper textarea {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid rgba(124, 154, 130, 0.3);
            border-radius: 14px;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 14.5px;
            color: var(--forest-deep);
            background: var(--white);
            outline: none;
            resize: none;
            min-height: 48px;
            max-height: 120px;
            line-height: 1.5;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrapper textarea:focus {
            border-color: var(--sage);
            box-shadow: 0 0 0 3px rgba(124, 154, 130, 0.15);
        }

        .input-wrapper textarea::placeholder {
            color: var(--rock);
            font-weight: 300;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--forest), var(--forest-deep));
            color: var(--sand-light);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 2px 10px rgba(45, 74, 62, 0.3);
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 14px rgba(45, 74, 62, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Welcome message */
        .welcome {
            text-align: center;
            max-width: 500px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .welcome-icon {
            font-size: 56px;
            margin-bottom: 16px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .welcome h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--forest);
            margin-bottom: 8px;
        }

        .welcome p {
            color: var(--rock);
            font-size: 15px;
            line-height: 1.6;
            font-weight: 300;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 20px;
        }

        .suggestion-chip {
            padding: 8px 16px;
            background: var(--white);
            border: 1px solid rgba(124, 154, 130, 0.3);
            border-radius: 20px;
            font-size: 13px;
            color: var(--forest);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Source Sans 3', sans-serif;
        }

        .suggestion-chip:hover {
            background: var(--forest);
            color: var(--sand-light);
            border-color: var(--forest);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px var(--shadow);
        }

        /* Scrollbar */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--sage-light);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon">🏔️</div>
        <div class="header-text">
            <h1>National Park Planner</h1>
            <p>Your AI guide to America's greatest outdoors</p>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
            <div class="welcome-icon">🌲</div>
            <h2>Plan Your Next Adventure</h2>
            <p>I can help you pick a park, plan an itinerary, find the best trails, and pack the right gear. Where shall we start?</p>
            <div class="suggestions">
                <button class="suggestion-chip" onclick="sendSuggestion(this)">Plan a trip to Yellowstone</button>
                <button class="suggestion-chip" onclick="sendSuggestion(this)">Best parks for beginners</button>
                <button class="suggestion-chip" onclick="sendSuggestion(this)">Week-long road trip ideas</button>
                <button class="suggestion-chip" onclick="sendSuggestion(this)">What to pack for Zion</button>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="message-avatar" style="background: linear-gradient(135deg, var(--forest), var(--sage)); box-shadow: 0 2px 8px rgba(45, 74, 62, 0.25);">🌲</div>
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea
                id="userInput"
                placeholder="Ask about parks, trails, itineraries..."
                rows="1"
                onkeydown="handleKeyDown(event)"
                oninput="autoResize(this)"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // Conversation history — same concept as the terminal chatbot!
        // This list gets sent with every request so Claude remembers the conversation.
        let conversationHistory = [];

        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const welcome = document.getElementById('welcome');

        // Auto-resize textarea as you type
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        // Handle Enter key (Shift+Enter for new line)
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Send a suggestion chip's text as a message
        function sendSuggestion(button) {
            userInput.value = button.textContent;
            sendMessage();
        }

        // Format Claude's response (basic markdown-like formatting)
        function formatResponse(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n- /g, '</p><li>')
                .replace(/\n(\d+)\. /g, '</p><li>')
                .replace(/^/, '<p>')
                .replace(/$/, '</p>');
        }

        // Add a message bubble to the chat
        function addMessage(role, text) {
            // Hide welcome screen on first message
            if (welcome) {
                welcome.style.display = 'none';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '🧑' : '🌲';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = role === 'assistant' ? formatResponse(text) : `<p>${text}</p>`;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);

            // Insert before the typing indicator
            chatContainer.insertBefore(messageDiv, typingIndicator);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Send a message to the backend
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Clear input and reset height
            userInput.value = '';
            userInput.style.height = 'auto';

            // Show user message
            addMessage('user', text);

            // Add to history
            conversationHistory.push({ role: 'user', content: text });

            // Disable input while waiting
            userInput.disabled = true;
            sendBtn.disabled = true;
            typingIndicator.classList.add('active');

            try {
                // Send the FULL conversation history to the backend
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory }),
                });

                if (!response.ok) {
                    throw new Error('Failed to get response');
                }

                const data = await response.json();

                // Add Claude's reply to history and display it
                conversationHistory.push({ role: 'assistant', content: data.reply });
                addMessage('assistant', data.reply);

            } catch (error) {
                addMessage('assistant', "Sorry, I'm having trouble connecting right now. Please try again in a moment.");
                // Remove the failed user message from history
                conversationHistory.pop();
            } finally {
                // Re-enable input
                userInput.disabled = false;
                sendBtn.disabled = false;
                typingIndicator.classList.remove('active');
                userInput.focus();
            }
        }
    </script>
</body>
</html>
