<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-2: #232733;
            --border: #2e3240;
            --text: #e4e6ed;
            --text-dim: #8b8fa3;
            --green: #22c55e;
            --green-dim: rgba(34, 197, 94, 0.15);
            --red: #ef4444;
            --red-dim: rgba(239, 68, 68, 0.15);
            --blue: #3b82f6;
            --purple: #a855f7;
            --amber: #f59e0b;
            --cyan: #06b6d4;
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span { font-size: 24px; }

        /* Search */
        .search-area {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-input {
            padding: 10px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            width: 200px;
            outline: none;
            text-transform: uppercase;
            transition: border-color 0.2s;
        }

        .search-input:focus { border-color: var(--accent); }

        .search-input::placeholder {
            text-transform: none;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-dim);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-outline {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .btn-outline:hover { border-color: var(--text-dim); color: var(--text); }
        .btn-outline.active { border-color: var(--accent); color: var(--accent); }

        /* Period buttons */
        .period-btns {
            display: flex;
            gap: 4px;
            margin-left: 12px;
        }

        .period-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .period-btn:hover { background: var(--surface-2); color: var(--text); }
        .period-btn.active { background: var(--accent); color: white; }

        /* Main layout */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Stock info row */
        .stock-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }

        .stat-box {
            background: var(--surface-2);
            border-radius: 10px;
            padding: 14px 16px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 500;
        }

        .stat-value.positive { color: var(--green); }
        .stat-value.negative { color: var(--red); }

        /* Chart containers */
        .chart-wrapper {
            position: relative;
            height: 350px;
        }

        .volume-wrapper {
            position: relative;
            height: 120px;
        }

        /* Compare section */
        .compare-input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .compare-input {
            padding: 10px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            width: 300px;
            outline: none;
            text-transform: uppercase;
            transition: border-color 0.2s;
        }

        .compare-input:focus { border-color: var(--accent); }

        .compare-input::placeholder {
            text-transform: none;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-dim);
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-dim);
            font-size: 15px;
        }

        .loading::before {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            margin-right: 12px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .tab:hover { background: var(--surface-2); }
        .tab.active { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Quick picks */
        .quick-picks {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .quick-pick {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .quick-pick:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>📈</span> Stock Dashboard</h1>
        <div class="search-area">
            <input type="text" class="search-input" id="symbolInput" placeholder="Enter ticker..." value="AAPL">
            <button class="btn btn-primary" onclick="loadStock()">Load</button>
            <div class="period-btns">
                <button class="period-btn" onclick="setPeriod('1mo')">1M</button>
                <button class="period-btn" onclick="setPeriod('3mo')">3M</button>
                <button class="period-btn" onclick="setPeriod('6mo')">6M</button>
                <button class="period-btn active" onclick="setPeriod('1y')">1Y</button>
                <button class="period-btn" onclick="setPeriod('2y')">2Y</button>
                <button class="period-btn" onclick="setPeriod('5y')">5Y</button>
            </div>
        </div>
    </div>

    <div class="main">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('single')">Single Stock</button>
            <button class="tab" onclick="switchTab('compare')">Compare Stocks</button>
        </div>

        <!-- Single Stock Tab -->
        <div class="tab-content active" id="tab-single">
            <!-- Company Info -->
            <div class="card" id="infoCard" style="display:none;">
                <div class="stock-info" id="stockInfo"></div>
            </div>

            <!-- Price Chart -->
            <div class="card" style="margin-top: 20px;">
                <div class="card-header">
                    <div class="card-title">Price History</div>
                    <div id="priceChange" style="font-family: 'JetBrains Mono', monospace; font-size: 14px;"></div>
                </div>
                <div class="chart-wrapper">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <!-- Volume Chart -->
            <div class="card" style="margin-top: 20px;">
                <div class="card-header">
                    <div class="card-title">Trading Volume</div>
                </div>
                <div class="volume-wrapper">
                    <canvas id="volumeChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Compare Tab -->
        <div class="tab-content" id="tab-compare">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Compare Performance</div>
                </div>
                <div class="compare-input-row">
                    <input type="text" class="compare-input" id="compareInput" placeholder="Tickers separated by commas (e.g. AAPL, MSFT, GOOGL)">
                    <button class="btn btn-primary" onclick="loadComparison()">Compare</button>
                </div>
                <div class="quick-picks">
                    <button class="quick-pick" onclick="quickCompare('AAPL,MSFT,GOOGL')">Big Tech</button>
                    <button class="quick-pick" onclick="quickCompare('TSLA,F,GM')">Auto</button>
                    <button class="quick-pick" onclick="quickCompare('JPM,GS,BAC')">Banks</button>
                    <button class="quick-pick" onclick="quickCompare('NFLX,DIS,WBD')">Streaming</button>
                    <button class="quick-pick" onclick="quickCompare('NVDA,AMD,INTC')">Chips</button>
                </div>
            </div>

            <div class="card" style="margin-top: 20px;">
                <div class="card-header">
                    <div class="card-title">% Change From Start</div>
                </div>
                <div class="chart-wrapper">
                    <canvas id="compareChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Quick picks for single stock -->
        <div class="card">
            <div class="card-title" style="margin-bottom: 8px;">Popular Tickers</div>
            <div class="quick-picks">
                <button class="quick-pick" onclick="quickLoad('AAPL')">AAPL</button>
                <button class="quick-pick" onclick="quickLoad('MSFT')">MSFT</button>
                <button class="quick-pick" onclick="quickLoad('GOOGL')">GOOGL</button>
                <button class="quick-pick" onclick="quickLoad('AMZN')">AMZN</button>
                <button class="quick-pick" onclick="quickLoad('TSLA')">TSLA</button>
                <button class="quick-pick" onclick="quickLoad('NVDA')">NVDA</button>
                <button class="quick-pick" onclick="quickLoad('META')">META</button>
                <button class="quick-pick" onclick="quickLoad('NFLX')">NFLX</button>
                <button class="quick-pick" onclick="quickLoad('JPM')">JPM</button>
                <button class="quick-pick" onclick="quickLoad('V')">V</button>
            </div>
        </div>
    </div>

    <script>
        let priceChart = null;
        let volumeChart = null;
        let compareChart = null;
        let currentPeriod = '1y';
        let currentSymbol = 'AAPL';

        // Chart.js global config for dark theme
        Chart.defaults.color = '#8b8fa3';
        Chart.defaults.borderColor = '#2e3240';

        // Handle Enter key in search
        document.getElementById('symbolInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loadStock();
        });
        document.getElementById('compareInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loadComparison();
        });

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        // Period selector
        function setPeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            loadStock();
        }

        // Quick load helpers
        function quickLoad(symbol) {
            document.getElementById('symbolInput').value = symbol;
            loadStock();
        }

        function quickCompare(symbols) {
            document.getElementById('compareInput').value = symbols;
            loadComparison();
        }

        // Format large numbers nicely
        function formatNumber(num) {
            if (num === null || num === undefined) return 'N/A';
            if (num >= 1e12) return '$' + (num / 1e12).toFixed(2) + 'T';
            if (num >= 1e9) return '$' + (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return '$' + (num / 1e6).toFixed(2) + 'M';
            return '$' + num.toLocaleString();
        }

        function formatVolume(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(0) + 'K';
            return num.toString();
        }

        // Load stock data
        async function loadStock() {
            const symbol = document.getElementById('symbolInput').value.trim().toUpperCase();
            if (!symbol) return;
            currentSymbol = symbol;

            // Load both price data and company info
            try {
                const [histRes, infoRes] = await Promise.all([
                    fetch(`/api/stock/${symbol}?period=${currentPeriod}`),
                    fetch(`/api/info/${symbol}`)
                ]);

                if (!histRes.ok) throw new Error('Stock not found');

                const histData = await histRes.json();
                const infoData = infoRes.ok ? await infoRes.json() : null;

                renderPriceChart(histData);
                renderVolumeChart(histData);
                if (infoData) renderStockInfo(infoData, histData);

            } catch (err) {
                alert(`Could not load data for "${symbol}". Check the ticker and try again.`);
            }
        }

        // Render company info
        function renderStockInfo(info, hist) {
            const card = document.getElementById('infoCard');
            card.style.display = 'block';

            const priceChange = hist.close[hist.close.length - 1] - hist.close[0];
            const pctChange = ((priceChange / hist.close[0]) * 100).toFixed(2);
            const isPositive = priceChange >= 0;

            const priceEl = document.getElementById('priceChange');
            priceEl.innerHTML = `<span style="color: ${isPositive ? '#22c55e' : '#ef4444'}">${isPositive ? '+' : ''}${pctChange}%</span>`;

            document.getElementById('stockInfo').innerHTML = `
                <div class="stat-box">
                    <div class="stat-label">${info.name}</div>
                    <div class="stat-value">$${info.current_price?.toFixed(2) || 'N/A'}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Market Cap</div>
                    <div class="stat-value">${formatNumber(info.market_cap)}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">P/E Ratio</div>
                    <div class="stat-value">${info.pe_ratio?.toFixed(2) || 'N/A'}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">52W High</div>
                    <div class="stat-value">$${info.fifty_two_week_high?.toFixed(2) || 'N/A'}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">52W Low</div>
                    <div class="stat-value">$${info.fifty_two_week_low?.toFixed(2) || 'N/A'}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Sector</div>
                    <div class="stat-value" style="font-size: 14px; font-family: 'DM Sans', sans-serif;">${info.sector}</div>
                </div>
            `;
        }

        // Render price chart
        function renderPriceChart(data) {
            if (priceChart) priceChart.destroy();

            const ctx = document.getElementById('priceChart').getContext('2d');
            const isUp = data.close[data.close.length - 1] >= data.close[0];
            const lineColor = isUp ? '#22c55e' : '#ef4444';
            const fillColor = isUp ? 'rgba(34, 197, 94, 0.08)' : 'rgba(239, 68, 68, 0.08)';

            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.dates,
                    datasets: [{
                        label: data.symbol,
                        data: data.close,
                        borderColor: lineColor,
                        backgroundColor: fillColor,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.1,
                        pointRadius: 0,
                        pointHoverRadius: 5,
                        pointHoverBackgroundColor: lineColor,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1a1d27',
                            borderColor: '#2e3240',
                            borderWidth: 1,
                            titleColor: '#8b8fa3',
                            bodyColor: '#e4e6ed',
                            bodyFont: { family: 'JetBrains Mono', size: 13 },
                            padding: 12,
                            callbacks: {
                                label: (ctx) => `$${ctx.parsed.y.toFixed(2)}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: {
                                maxTicksLimit: 8,
                                font: { size: 11 }
                            }
                        },
                        y: {
                            grid: { color: '#1e2130' },
                            ticks: {
                                font: { family: 'JetBrains Mono', size: 11 },
                                callback: (v) => '$' + v.toFixed(0)
                            }
                        }
                    }
                }
            });
        }

        // Render volume chart
        function renderVolumeChart(data) {
            if (volumeChart) volumeChart.destroy();

            const ctx = document.getElementById('volumeChart').getContext('2d');
            const colors = data.close.map((c, i) =>
                i === 0 ? 'rgba(59, 130, 246, 0.4)' :
                c >= data.close[i - 1] ? 'rgba(34, 197, 94, 0.4)' : 'rgba(239, 68, 68, 0.4)'
            );

            volumeChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.dates,
                    datasets: [{
                        data: data.volume,
                        backgroundColor: colors,
                        borderWidth: 0,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1a1d27',
                            borderColor: '#2e3240',
                            borderWidth: 1,
                            bodyFont: { family: 'JetBrains Mono', size: 13 },
                            padding: 12,
                            callbacks: {
                                label: (ctx) => formatVolume(ctx.parsed.y) + ' shares'
                            }
                        }
                    },
                    scales: {
                        x: { display: false },
                        y: {
                            grid: { color: '#1e2130' },
                            ticks: {
                                font: { family: 'JetBrains Mono', size: 10 },
                                callback: (v) => formatVolume(v),
                                maxTicksLimit: 3,
                            }
                        }
                    }
                }
            });
        }

        // Load comparison
        async function loadComparison() {
            const symbols = document.getElementById('compareInput').value.trim();
            if (!symbols) return;

            try {
                const res = await fetch(`/api/compare?symbols=${encodeURIComponent(symbols)}&period=${currentPeriod}`);
                if (!res.ok) throw new Error('Failed to load');
                const data = await res.json();
                renderCompareChart(data);
            } catch (err) {
                alert('Could not load comparison. Check your tickers and try again.');
            }
        }

        // Render comparison chart
        function renderCompareChart(stocks) {
            if (compareChart) compareChart.destroy();

            const colors = ['#3b82f6', '#22c55e', '#f59e0b', '#a855f7', '#06b6d4'];
            const ctx = document.getElementById('compareChart').getContext('2d');

            const datasets = stocks.map((stock, i) => ({
                label: stock.symbol,
                data: stock.pct_change,
                borderColor: colors[i % colors.length],
                backgroundColor: 'transparent',
                borderWidth: 2,
                tension: 0.1,
                pointRadius: 0,
                pointHoverRadius: 5,
                pointHoverBackgroundColor: colors[i % colors.length],
            }));

            compareChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: stocks[0].dates,
                    datasets: datasets,
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: {
                            labels: {
                                font: { family: 'JetBrains Mono', size: 12 },
                                padding: 20,
                                usePointStyle: true,
                                pointStyleWidth: 10,
                            }
                        },
                        tooltip: {
                            backgroundColor: '#1a1d27',
                            borderColor: '#2e3240',
                            borderWidth: 1,
                            bodyFont: { family: 'JetBrains Mono', size: 13 },
                            padding: 12,
                            callbacks: {
                                label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y >= 0 ? '+' : ''}${ctx.parsed.y.toFixed(2)}%`
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { maxTicksLimit: 8, font: { size: 11 } }
                        },
                        y: {
                            grid: { color: '#1e2130' },
                            ticks: {
                                font: { family: 'JetBrains Mono', size: 11 },
                                callback: (v) => (v >= 0 ? '+' : '') + v + '%'
                            }
                        }
                    }
                }
            });
        }

        // Load default stock on page load
        loadStock();
    </script>
</body>
</html>
