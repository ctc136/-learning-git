<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fc;
            --surface: #ffffff;
            --surface-2: #f1f3f9;
            --border: #e2e5f0;
            --text: #1e2030;
            --text-dim: #6b7194;
            --text-light: #9da3c0;
            --blue: #4f6ef7;
            --blue-light: #eef1fe;
            --blue-dark: #3b57d9;
            --green: #10b981;
            --green-light: #ecfdf5;
            --amber: #f59e0b;
            --amber-light: #fffbeb;
            --red: #ef4444;
            --red-light: #fef2f2;
            --purple: #8b5cf6;
            --purple-light: #f5f3ff;
            --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            z-index: 10;
        }

        .header h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .header-right { display: flex; gap: 8px; }

        .tab-btn {
            padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border);
            background: transparent; color: var(--text-dim); font-family: 'Inter', sans-serif;
            font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;
        }
        .tab-btn:hover { background: var(--surface-2); }
        .tab-btn.active { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }

        /* Layout */
        .layout { flex: 1; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar {
            width: 300px; background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }

        .sidebar-header {
            padding: 16px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .sidebar-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); }

        .doc-count {
            font-size: 11px; background: var(--blue-light); color: var(--blue);
            padding: 2px 8px; border-radius: 10px; font-weight: 600;
        }

        .sidebar-content { flex: 1; overflow-y: auto; padding: 8px; }

        .doc-item {
            padding: 12px; border-radius: 10px; margin-bottom: 4px;
            cursor: default; transition: background 0.15s;
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .doc-item:hover { background: var(--surface-2); }

        .doc-name { font-size: 13px; font-weight: 500; word-break: break-word; }
        .doc-meta { font-size: 11px; color: var(--text-light); margin-top: 4px; }
        .doc-type { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .doc-type.file { background: var(--purple-light); color: var(--purple); }
        .doc-type.url { background: var(--green-light); color: var(--green); }

        .doc-delete {
            background: none; border: none; color: var(--text-light); cursor: pointer;
            font-size: 16px; padding: 2px 6px; border-radius: 4px; transition: all 0.15s;
        }
        .doc-delete:hover { background: var(--red-light); color: var(--red); }

        /* Upload area */
        .upload-area {
            padding: 12px; border-top: 1px solid var(--border);
        }

        .upload-drop {
            border: 2px dashed var(--border); border-radius: 10px; padding: 20px;
            text-align: center; cursor: pointer; transition: all 0.15s;
        }
        .upload-drop:hover { border-color: var(--blue); background: var(--blue-light); }
        .upload-drop.dragover { border-color: var(--blue); background: var(--blue-light); }

        .upload-icon { font-size: 28px; margin-bottom: 8px; }
        .upload-text { font-size: 12px; color: var(--text-dim); }
        .upload-text strong { color: var(--blue); }

        .url-input-row {
            display: flex; gap: 6px; margin-top: 10px;
        }

        .url-input {
            flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
            font-size: 12px; font-family: 'Inter', sans-serif; outline: none;
        }
        .url-input:focus { border-color: var(--blue); }

        .btn {
            padding: 8px 14px; border-radius: 8px; border: none;
            font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
            cursor: pointer; transition: all 0.15s;
        }
        .btn-primary { background: var(--blue); color: white; }
        .btn-primary:hover { background: var(--blue-dark); }
        .btn-sm { padding: 6px 10px; font-size: 11px; }

        /* Chat area */
        .chat-area { flex: 1; display: flex; flex-direction: column; }

        .messages {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
        }

        .message { display: flex; gap: 12px; max-width: 800px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

        .message.user { flex-direction: row-reverse; margin-left: auto; }

        .msg-avatar {
            width: 32px; height: 32px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 16px;
            flex-shrink: 0; margin-top: 4px;
        }
        .message.assistant .msg-avatar { background: var(--blue-light); }
        .message.user .msg-avatar { background: var(--surface-2); }

        .msg-bubble {
            padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.7;
        }
        .message.assistant .msg-bubble {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 4px 14px 14px 14px; box-shadow: var(--shadow);
        }
        .message.user .msg-bubble {
            background: var(--blue); color: white; border-radius: 14px 4px 14px 14px;
        }

        .msg-bubble p { margin-bottom: 8px; }
        .msg-bubble p:last-child { margin-bottom: 0; }

        .sources-bar {
            display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
            padding-top: 10px; border-top: 1px solid var(--border);
        }

        .source-tag {
            font-size: 11px; padding: 3px 10px; border-radius: 12px;
            background: var(--blue-light); color: var(--blue); font-weight: 500;
        }

        .chunks-toggle {
            font-size: 11px; color: var(--text-light); cursor: pointer;
            margin-top: 8px; transition: color 0.15s;
        }
        .chunks-toggle:hover { color: var(--blue); }

        .chunks-detail {
            display: none; margin-top: 8px; font-size: 12px; color: var(--text-dim);
            background: var(--surface-2); border-radius: 8px; padding: 12px;
            max-height: 200px; overflow-y: auto;
        }
        .chunks-detail.visible { display: block; }

        .chunk-item { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .chunk-item:last-child { margin-bottom: 0; border-bottom: none; }
        .chunk-source { font-weight: 600; color: var(--blue); font-size: 11px; margin-bottom: 4px; }
        .chunk-score { font-size: 10px; color: var(--text-light); }

        /* Input */
        .input-area {
            padding: 14px 20px; background: var(--surface);
            border-top: 1px solid var(--border);
        }

        .input-row { display: flex; gap: 10px; max-width: 800px; margin: 0 auto; }

        .chat-input {
            flex: 1; padding: 12px 16px; border: 1px solid var(--border);
            border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 14px;
            outline: none; resize: none; min-height: 44px; max-height: 120px;
            transition: border-color 0.2s;
        }
        .chat-input:focus { border-color: var(--blue); }

        .send-btn {
            width: 44px; height: 44px; border-radius: 50%; border: none;
            background: var(--blue); color: white; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; flex-shrink: 0;
        }
        .send-btn:hover { background: var(--blue-dark); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Welcome */
        .welcome {
            text-align: center; padding: 60px 20px; max-width: 500px; margin: 0 auto;
        }
        .welcome .icon { font-size: 52px; margin-bottom: 16px; }
        .welcome h2 { font-size: 22px; margin-bottom: 8px; }
        .welcome p { color: var(--text-dim); font-size: 14px; line-height: 1.6; }

        /* Typing indicator */
        .typing { display: flex; gap: 4px; padding: 8px 0; }
        .typing span {
            width: 7px; height: 7px; border-radius: 50%; background: var(--text-light);
            animation: bounce 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.16s; }
        .typing span:nth-child(3) { animation-delay: 0.32s; }
        @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

        /* Toast */
        .toast {
            position: fixed; bottom: 20px; right: 20px; padding: 12px 20px;
            border-radius: 10px; font-size: 13px; font-weight: 500;
            transform: translateY(100px); transition: transform 0.3s; z-index: 50;
            background: var(--green-light); color: var(--green); border: 1px solid var(--green);
        }
        .toast.visible { transform: translateY(0); }
        .toast.error { background: var(--red-light); color: var(--red); border-color: var(--red); }

        /* Scrollbar */
        .messages::-webkit-scrollbar, .sidebar-content::-webkit-scrollbar { width: 5px; }
        .messages::-webkit-scrollbar-thumb, .sidebar-content::-webkit-scrollbar-thumb {
            background: var(--border); border-radius: 3px;
        }

        /* History view */
        .history-list { padding: 20px; max-width: 800px; margin: 0 auto; }
        .history-item {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px; margin-bottom: 12px;
        }
        .history-q { font-weight: 600; margin-bottom: 8px; }
        .history-a { font-size: 14px; color: var(--text-dim); line-height: 1.6; }
        .history-date { font-size: 11px; color: var(--text-light); margin-top: 8px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 Knowledge Base</h1>
        <div class="header-right">
            <button class="tab-btn active" id="tabChat" onclick="showView('chat')">Chat</button>
            <button class="tab-btn" id="tabHistory" onclick="showView('history')">History</button>
        </div>
    </div>

    <div class="layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Documents</span>
                <span class="doc-count" id="docCount">0</span>
            </div>

            <div class="sidebar-content" id="docList"></div>

            <div class="upload-area">
                <div class="upload-drop" id="dropZone"
                     onclick="document.getElementById('fileInput').click()"
                     ondragover="event.preventDefault(); this.classList.add('dragover')"
                     ondragleave="this.classList.remove('dragover')"
                     ondrop="handleDrop(event)">
                    <div class="upload-icon">📄</div>
                    <div class="upload-text">Drop files here or <strong>click to upload</strong><br>PDF, TXT, MD, HTML</div>
                </div>
                <input type="file" id="fileInput" style="display:none" multiple
                       accept=".pdf,.txt,.md,.markdown,.html,.htm,.text"
                       onchange="handleFileSelect(event)">

                <div class="url-input-row">
                    <input type="text" class="url-input" id="urlInput" placeholder="Add a web URL..."
                           onkeydown="if(event.key==='Enter')addUrl()">
                    <button class="btn btn-primary btn-sm" onclick="addUrl()">Add</button>
                </div>
            </div>
        </div>

        <!-- Main content -->
        <div class="chat-area" id="chatView">
            <div class="messages" id="messages">
                <div class="welcome">
                    <div class="icon">🧠</div>
                    <h2>Ask Your Knowledge Base</h2>
                    <p>Upload documents on the left, then ask questions about them. I'll search through your docs and give you answers based on what I find.</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-row">
                    <textarea class="chat-input" id="chatInput"
                              placeholder="Ask a question about your documents..."
                              rows="1"
                              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();askQuestion()}"
                              oninput="this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="askQuestion()">➤</button>
                </div>
            </div>
        </div>

        <!-- History view -->
        <div class="chat-area hidden" id="historyView">
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let firstQuestion = true;

        // ---------------------------------------------------------------------------
        // Views
        // ---------------------------------------------------------------------------
        function showView(view) {
            document.getElementById('chatView').classList.toggle('hidden', view !== 'chat');
            document.getElementById('historyView').classList.toggle('hidden', view !== 'history');
            document.getElementById('tabChat').classList.toggle('active', view === 'chat');
            document.getElementById('tabHistory').classList.toggle('active', view === 'history');
            if (view === 'history') loadHistory();
        }

        // ---------------------------------------------------------------------------
        // Document management
        // ---------------------------------------------------------------------------
        async function loadDocuments() {
            try {
                const res = await fetch('/api/documents');
                const docs = await res.json();
                document.getElementById('docCount').textContent = docs.length;

                const list = document.getElementById('docList');
                if (docs.length === 0) {
                    list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-light);font-size:13px;">No documents yet.<br>Upload files or add URLs below.</div>';
                    return;
                }

                list.innerHTML = docs.map(d => `
                    <div class="doc-item">
                        <div>
                            <div class="doc-name">${d.name}</div>
                            <div class="doc-meta">
                                <span class="doc-type ${d.source_type}">${d.source_type}</span>
                                · ${d.total_chunks} chunks
                            </div>
                        </div>
                        <button class="doc-delete" onclick="deleteDoc(${d.id})" title="Remove">×</button>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Error loading docs:', err);
            }
        }

        async function handleFileSelect(event) {
            const files = event.target.files;
            for (const file of files) {
                await uploadFile(file);
            }
            event.target.value = '';
        }

        function handleDrop(event) {
            event.preventDefault();
            event.currentTarget.classList.remove('dragover');
            const files = event.dataTransfer.files;
            for (const file of files) {
                uploadFile(file);
            }
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                showToast(`Uploading ${file.name}...`);
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail);
                }
                const data = await res.json();
                showToast(`${file.name}: ${data.chunks} chunks indexed`);
                loadDocuments();
            } catch (err) {
                showToast(`Error: ${err.message}`, true);
            }
        }

        async function addUrl() {
            const input = document.getElementById('urlInput');
            const url = input.value.trim();
            if (!url) return;

            try {
                showToast('Fetching URL...');
                const res = await fetch('/api/add-url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url }),
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail);
                }
                const data = await res.json();
                showToast(`${data.chunks} chunks indexed from URL`);
                input.value = '';
                loadDocuments();
            } catch (err) {
                showToast(`Error: ${err.message}`, true);
            }
        }

        async function deleteDoc(docId) {
            if (!confirm('Remove this document from your knowledge base?')) return;
            try {
                await fetch(`/api/documents/${docId}`, { method: 'DELETE' });
                loadDocuments();
                showToast('Document removed');
            } catch (err) {
                showToast('Error removing document', true);
            }
        }

        // ---------------------------------------------------------------------------
        // Chat
        // ---------------------------------------------------------------------------
        function addMessage(role, content, sources = [], topChunks = []) {
            if (firstQuestion) {
                document.getElementById('messages').innerHTML = '';
                firstQuestion = false;
            }

            const msg = document.createElement('div');
            msg.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'msg-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🧠';

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';

            // Format content
            const formatted = content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/^/, '<p>').replace(/$/, '</p>');
            bubble.innerHTML = formatted;

            // Add sources
            if (sources.length > 0) {
                const sourcesBar = document.createElement('div');
                sourcesBar.className = 'sources-bar';
                sourcesBar.innerHTML = '<span style="font-size:11px;color:var(--text-light);margin-right:4px;">Sources:</span>' +
                    sources.map(s => `<span class="source-tag">${s}</span>`).join('');
                bubble.appendChild(sourcesBar);
            }

            // Add expandable chunks detail
            if (topChunks.length > 0) {
                const toggleId = 'chunks-' + Date.now();
                const toggle = document.createElement('div');
                toggle.className = 'chunks-toggle';
                toggle.textContent = `Show ${topChunks.length} matched chunks ▼`;
                toggle.onclick = () => {
                    const detail = document.getElementById(toggleId);
                    detail.classList.toggle('visible');
                    toggle.textContent = detail.classList.contains('visible')
                        ? `Hide matched chunks ▲`
                        : `Show ${topChunks.length} matched chunks ▼`;
                };
                bubble.appendChild(toggle);

                const detail = document.createElement('div');
                detail.className = 'chunks-detail';
                detail.id = toggleId;
                detail.innerHTML = topChunks.map(c => `
                    <div class="chunk-item">
                        <div class="chunk-source">${c.source} <span class="chunk-score">score: ${c.score}</span></div>
                        <div>${c.preview}</div>
                    </div>
                `).join('');
                bubble.appendChild(detail);
            }

            msg.appendChild(avatar);
            msg.appendChild(bubble);

            const messages = document.getElementById('messages');
            messages.appendChild(msg);
            messages.scrollTop = messages.scrollHeight;
        }

        function showTyping() {
            const msg = document.createElement('div');
            msg.className = 'message assistant';
            msg.id = 'typingMsg';
            msg.innerHTML = `
                <div class="msg-avatar">🧠</div>
                <div class="msg-bubble">
                    <div class="typing"><span></span><span></span><span></span></div>
                </div>
            `;
            const messages = document.getElementById('messages');
            messages.appendChild(msg);
            messages.scrollTop = messages.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingMsg');
            if (el) el.remove();
        }

        async function askQuestion() {
            const input = document.getElementById('chatInput');
            const question = input.value.trim();
            if (!question) return;

            input.value = '';
            input.style.height = 'auto';
            addMessage('user', question);

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            showTyping();

            try {
                const res = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question }),
                });

                removeTyping();

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail);
                }

                const data = await res.json();
                addMessage('assistant', data.answer, data.sources, data.top_chunks);
            } catch (err) {
                removeTyping();
                addMessage('assistant', `Error: ${err.message}`);
            }

            sendBtn.disabled = false;
            input.focus();
        }

        // ---------------------------------------------------------------------------
        // History
        // ---------------------------------------------------------------------------
        async function loadHistory() {
            const list = document.getElementById('historyList');
            try {
                const res = await fetch('/api/history');
                const convos = await res.json();

                if (convos.length === 0) {
                    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);">No conversation history yet.</div>';
                    return;
                }

                list.innerHTML = convos.map(c => `
                    <div class="history-item">
                        <div class="history-q">${c.question}</div>
                        <div class="history-a">${c.answer.substring(0, 300)}${c.answer.length > 300 ? '...' : ''}</div>
                        <div class="history-date">${new Date(c.created_at).toLocaleString()}</div>
                    </div>
                `).join('');
            } catch (err) {
                list.innerHTML = '<div style="color:var(--red);padding:20px;">Error loading history</div>';
            }
        }

        // ---------------------------------------------------------------------------
        // Toast
        // ---------------------------------------------------------------------------
        function showToast(msg, isError = false) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = `toast visible ${isError ? 'error' : ''}`;
            setTimeout(() => el.classList.remove('visible'), 3000);
        }

        // ---------------------------------------------------------------------------
        // Init
        // ---------------------------------------------------------------------------
        loadDocuments();
    </script>
</body>
</html>
